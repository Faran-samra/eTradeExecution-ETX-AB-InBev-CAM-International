# =====================================================================
# Netlify deploy configuration
# =====================================================================

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# SPA: todas las rutas van al index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers de seguridad
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), geolocation=(self), microphone=()"
    # connect-src: Supabase REST + Auth + Storage + Realtime (wss) only.
    # Anthropic API is intentionally excluded — all AI calls go through the
    # Supabase Edge Function proxy, never directly from the browser.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://*.supabase.co https://*.r2.dev; connect-src 'self' https://*.supabase.co wss://*.supabase.co; media-src 'self' blob:;"

# Cache para assets estáticos (Vite añade hash al nombre → inmutable)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# favicon y otros recursos públicos — sin cache agresivo
[[headers]]
  for = "/favicon*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
